<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 760" role="img" aria-labelledby="title desc">
  <title id="title">Dual-Stream Masking 이해용 시각화</title>
  <desc id="desc">깨끗한 memory stream과 마스킹된 prediction stream을 분리하고, 현재 prediction block이 깨끗한 이전 memory와 현재 블록의 앞 토큰만 보는 구조를 설명한다.</desc>
  <defs>
    <style>
      .bg{fill:#f7f2e8}.panel{fill:#fffdf8;stroke:#d8d0c1;stroke-width:2}.ink{fill:#1d1c18}.muted{fill:#6d685f}.memory{fill:#dce8f4;stroke:#426c91;stroke-width:2}.observed{fill:#dcebd7;stroke:#4f8a4b;stroke-width:2}.mask{fill:#eeeae2;stroke:#8f8a81;stroke-width:2;stroke-dasharray:5 4}.focus{fill:#fff0e9;stroke:#c85737;stroke-width:2.5}.forbid{stroke:#c85737;stroke-width:3}.arrow{stroke:#426c91;stroke-width:2.5;fill:none}.local{stroke:#5f9858;stroke-width:2.5;fill:none}.rule{stroke:#d8d0c1;stroke-width:2}.sans{font-family:'Noto Sans KR','Apple SD Gothic Neo',sans-serif}.serif{font-family:'Noto Serif KR','AppleMyungjo',serif}.mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace}.strong{font-weight:700}
    </style>
    <marker id="barrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#426c91"/></marker>
    <marker id="garrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#5f9858"/></marker>
  </defs>
  <rect class="bg" width="1000" height="760" rx="28"/>
  <text x="50" y="60" class="ink serif strong" font-size="34">Dual-Stream Masking: 깨끗한 과거와 복원할 현재를 분리하기</text>
  <text x="50" y="96" class="muted sans" font-size="20">학습 중 이전 블록의 불완전한 예측 대신, 원본에서 가져온 clean history를 조건으로 사용합니다.</text>

  <rect x="40" y="125" width="920" height="500" rx="24" class="panel"/>

  <text x="70" y="171" class="ink sans strong" font-size="24">Memory stream · xₒ</text>
  <text x="265" y="171" class="muted sans" font-size="17">원본 토큰을 가리지 않은 깨끗한 참조 경로</text>
  <g transform="translate(80 195)">
    <rect x="0" y="0" width="250" height="92" rx="16" fill="#eef4fa" stroke="#a9bfd3"/>
    <text x="20" y="27" class="muted sans strong" font-size="15">BLOCK 1 · positions 1–4</text>
    <rect x="20" y="42" width="42" height="34" rx="7" class="memory"/><text x="41" y="65" text-anchor="middle" class="ink sans strong" font-size="17">A</text>
    <rect x="72" y="42" width="42" height="34" rx="7" class="memory"/><text x="93" y="65" text-anchor="middle" class="ink sans strong" font-size="17">B</text>
    <rect x="124" y="42" width="42" height="34" rx="7" class="memory"/><text x="145" y="65" text-anchor="middle" class="ink sans strong" font-size="17">C</text>
    <rect x="176" y="42" width="42" height="34" rx="7" class="memory"/><text x="197" y="65" text-anchor="middle" class="ink sans strong" font-size="17">D</text>

    <rect x="270" y="0" width="250" height="92" rx="16" fill="#eef4fa" stroke="#a9bfd3"/>
    <text x="290" y="27" class="muted sans strong" font-size="15">BLOCK 2 · positions 5–8</text>
    <rect x="290" y="42" width="42" height="34" rx="7" class="memory"/><text x="311" y="65" text-anchor="middle" class="ink sans strong" font-size="17">E</text>
    <rect x="342" y="42" width="42" height="34" rx="7" class="memory"/><text x="363" y="65" text-anchor="middle" class="ink sans strong" font-size="17">F</text>
    <rect x="394" y="42" width="42" height="34" rx="7" class="memory"/><text x="415" y="65" text-anchor="middle" class="ink sans strong" font-size="17">G</text>
    <rect x="446" y="42" width="42" height="34" rx="7" class="memory"/><text x="467" y="65" text-anchor="middle" class="ink sans strong" font-size="17">H</text>

    <rect x="540" y="0" width="250" height="92" rx="16" fill="#eef4fa" stroke="#a9bfd3"/>
    <text x="560" y="27" class="muted sans strong" font-size="15">BLOCK 3 · positions 9–12</text>
    <rect x="560" y="42" width="42" height="34" rx="7" class="memory"/><text x="581" y="65" text-anchor="middle" class="ink sans strong" font-size="17">I</text>
    <rect x="612" y="42" width="42" height="34" rx="7" class="memory"/><text x="633" y="65" text-anchor="middle" class="ink sans strong" font-size="17">J</text>
    <rect x="664" y="42" width="42" height="34" rx="7" class="memory"/><text x="685" y="65" text-anchor="middle" class="ink sans strong" font-size="17">K</text>
    <rect x="716" y="42" width="42" height="34" rx="7" class="memory"/><text x="737" y="65" text-anchor="middle" class="ink sans strong" font-size="17">L</text>
  </g>

  <line x1="70" y1="319" x2="930" y2="319" class="rule"/>
  <text x="70" y="362" class="ink sans strong" font-size="24">Prediction stream · xₜ</text>
  <text x="282" y="362" class="muted sans" font-size="17">블록별 masking + 블록 내부 topological reordering</text>
  <g transform="translate(80 386)">
    <rect x="0" y="0" width="250" height="110" rx="16" fill="#faf7f0" stroke="#d7d0c4"/>
    <text x="20" y="27" class="muted sans strong" font-size="15">BLOCK 1 · noisy prediction</text>
    <rect x="20" y="48" width="42" height="34" rx="7" class="observed"/><text x="41" y="71" text-anchor="middle" class="ink sans strong" font-size="17">A</text>
    <rect x="72" y="48" width="42" height="34" rx="7" class="mask"/><text x="93" y="71" text-anchor="middle" class="muted sans" font-size="14">[M]</text>
    <rect x="124" y="48" width="42" height="34" rx="7" class="observed"/><text x="145" y="71" text-anchor="middle" class="ink sans strong" font-size="17">C</text>
    <rect x="176" y="48" width="42" height="34" rx="7" class="mask"/><text x="197" y="71" text-anchor="middle" class="muted sans" font-size="14">[M]</text>

    <rect x="270" y="0" width="250" height="110" rx="16" class="focus"/>
    <text x="290" y="27" class="ink sans strong" font-size="15">BLOCK 2 · 현재 학습 대상</text>
    <rect x="290" y="48" width="42" height="34" rx="7" class="observed"/><text x="311" y="71" text-anchor="middle" class="ink sans strong" font-size="17">E</text>
    <rect x="342" y="48" width="42" height="34" rx="7" class="observed"/><text x="363" y="71" text-anchor="middle" class="ink sans strong" font-size="17">G</text>
    <rect x="394" y="48" width="42" height="34" rx="7" class="mask"/><text x="415" y="71" text-anchor="middle" class="muted sans" font-size="14">[M]</text>
    <rect x="446" y="48" width="42" height="34" rx="7" class="mask"/><text x="467" y="71" text-anchor="middle" class="muted sans" font-size="14">[M]</text>

    <rect x="540" y="0" width="250" height="110" rx="16" fill="#faf7f0" stroke="#d7d0c4"/>
    <text x="560" y="27" class="muted sans strong" font-size="15">BLOCK 3 · 별도 학습 대상</text>
    <rect x="560" y="48" width="42" height="34" rx="7" class="observed"/><text x="581" y="71" text-anchor="middle" class="ink sans strong" font-size="17">I</text>
    <rect x="612" y="48" width="42" height="34" rx="7" class="mask"/><text x="633" y="71" text-anchor="middle" class="muted sans" font-size="14">[M]</text>
    <rect x="664" y="48" width="42" height="34" rx="7" class="observed"/><text x="685" y="71" text-anchor="middle" class="ink sans strong" font-size="17">K</text>
    <rect x="716" y="48" width="42" height="34" rx="7" class="mask"/><text x="737" y="71" text-anchor="middle" class="muted sans" font-size="14">[M]</text>
  </g>

  <path d="M205 287 C205 338 355 324 390 386" class="arrow" marker-end="url(#barrow)"/>
  <text x="245" y="337" class="muted sans strong" font-size="16">clean history xₒ^(&lt;k)</text>
  <path d="M392 462 H474" class="local" marker-end="url(#garrow)"/>
  <text x="433" y="528" text-anchor="middle" class="muted sans" font-size="15">현재 블록 안에서는 causal 순서만 허용</text>

  <path d="M318 420 L356 458 M356 420 L318 458" class="forbid"/>
  <text x="160" y="536" class="muted sans" font-size="15">이전 prediction block의 불완전한 출력은<br/>현재 블록의 과거 문맥으로 쓰지 않음</text>

  <rect x="75" y="655" width="850" height="70" rx="18" fill="#eef6ea" stroke="#b8d4b1"/>
  <text x="500" y="683" text-anchor="middle" class="ink sans strong" font-size="20">학습: clean memory가 과거를 제공 → 추론: 이미 확정된 KV prefix가 같은 역할</text>
  <text x="500" y="710" text-anchor="middle" class="muted sans" font-size="17">그래서 훈련 때의 조건 구조와 실제 streaming decoding의 조건 구조를 맞출 수 있습니다.</text>
</svg>