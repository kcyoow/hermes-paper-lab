<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">대규모 합성 컴퓨터 방법론 개요</title>
  <desc id="desc">페르소나에서 합성 컴퓨터, 장기 시뮬레이션, 스킬로 이어지는 원문 근거 시각 지도입니다.</desc>
  <defs>
    <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#18E299" stop-opacity="0.42"/>
      <stop offset="0.56" stop-color="#7cf2c4" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.04"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity="0.22"/>
    </filter>
    <style>
      .bg{fill:#0d0d0d}.panel{fill:#151515;stroke:rgba(255,255,255,.12);stroke-width:1}.soft{fill:url(#g)}
      .title{font:700 38px 'Noto Sans KR',Inter,Arial,sans-serif;fill:#fff;letter-spacing:-1.2px}.sub{font:400 17px 'Noto Sans KR',Inter,Arial,sans-serif;fill:#a7a7a7}.mono{font:600 13px 'Noto Sans KR','Geist Mono','SFMono-Regular',monospace;fill:#18E299;letter-spacing:.4px}.label{font:650 19px 'Noto Sans KR',Inter,Arial,sans-serif;fill:#fff}.small{font:400 14px 'Noto Sans KR',Inter,Arial,sans-serif;fill:#b8b8b8}.num{font:700 30px Inter,Arial,sans-serif;fill:#18E299}.arrow{stroke:#18E299;stroke-width:3;fill:none;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#18E299"/></marker>
  </defs>
  <rect class="bg" width="1200" height="760" rx="30"/>
  <circle cx="190" cy="40" r="270" class="soft"/>
  <circle cx="1010" cy="660" r="280" class="soft" opacity=".7"/>
  <text x="60" y="72" class="mono">ARXIV:2604.28181V1 · 논문 전체 흐름 해설</text>
  <text x="60" y="124" class="title">대규모 합성 컴퓨터</text>
  <text x="60" y="154" class="sub">페르소나 기반 사용자 컴퓨터가 장기 생산성 시뮬레이션과 재사용 가능한 에이전트 경험으로 이어집니다.</text>

  <g filter="url(#shadow)">
    <rect x="60" y="220" width="220" height="132" rx="22" class="panel"/>
    <text x="84" y="260" class="mono">1단계</text><text x="84" y="292" class="label">페르소나</text>
    <text x="84" y="322" class="small">직업 · 프로젝트 · 습관</text>
    <text x="84" y="342" class="small">정리 방식 · 사용 도구</text>

    <rect x="330" y="220" width="240" height="132" rx="22" class="panel"/>
    <text x="354" y="260" class="mono">2단계</text><text x="354" y="292" class="label">합성 컴퓨터</text>
    <text x="354" y="322" class="small">파일시스템 정책 + 계획</text>
    <text x="354" y="342" class="small">의존관계 반영 산출물</text>

    <rect x="620" y="220" width="240" height="132" rx="22" class="panel"/>
    <text x="644" y="260" class="mono">3단계</text><text x="644" y="292" class="label">시뮬레이션</text>
    <text x="644" y="322" class="small">설정 에이전트 + 작업 에이전트</text>
    <text x="644" y="342" class="small">주간 계획 · 일일 업무</text>

    <rect x="910" y="220" width="230" height="132" rx="22" class="panel"/>
    <text x="934" y="260" class="mono">4단계</text><text x="934" y="292" class="label">경험 신호</text>
    <text x="934" y="322" class="small">회고 분석 보고서</text>
    <text x="934" y="342" class="small">직업별 스킬</text>
  </g>
  <path d="M280 286 C300 286 306 286 330 286" class="arrow"/><path d="M570 286 C590 286 596 286 620 286" class="arrow"/><path d="M860 286 C884 286 890 286 910 286" class="arrow"/>

  <g>
    <rect x="60" y="430" width="250" height="170" rx="22" class="panel"/>
    <text x="86" y="470" class="mono">예비 실험 규모</text><text x="86" y="515" class="num">1,000</text><text x="86" y="544" class="small">합성 컴퓨터</text><text x="86" y="568" class="small">업무 후 평균 파일 112 → 197개</text>
    <rect x="340" y="430" width="250" height="170" rx="22" class="panel"/>
    <text x="366" y="470" class="mono">장기 실행</text><text x="366" y="515" class="num">2,272</text><text x="366" y="544" class="small">시뮬레이션당 평균 턴</text><text x="366" y="568" class="small">평균 실제 경과 8.59시간</text>
    <rect x="620" y="430" width="250" height="170" rx="22" class="panel"/>
    <text x="646" y="470" class="mono">협업</text><text x="646" y="515" class="num">5.5</text><text x="646" y="544" class="small">평균 협업자 수</text><text x="646" y="568" class="small">평균 소통 31회</text>
    <rect x="900" y="430" width="240" height="170" rx="22" class="panel"/>
    <text x="926" y="470" class="mono">스킬 신호</text><text x="926" y="515" class="num">+7.0%p</text><text x="926" y="544" class="small">61.6% → 68.6%</text><text x="926" y="568" class="small">검증 100개 중 83승</text>
  </g>

  <path d="M180 635 C420 710 780 710 1030 635" stroke="#18E299" stroke-opacity=".55" stroke-width="3" fill="none" stroke-dasharray="8 10"/>
  <text x="320" y="688" class="small">작업 궤적 신호 → 스킬 → 개선된 에이전트 → 다음 시뮬레이션 라운드</text>
</svg>
