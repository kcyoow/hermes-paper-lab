<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Synthetic Computers at Scale method overview</title>
  <desc id="desc">A source-grounded visual map of persona to synthetic computer to long-horizon simulation to skills.</desc>
  <defs>
    <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#18E299" stop-opacity="0.42"/>
      <stop offset="0.56" stop-color="#7cf2c4" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.04"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity="0.22"/>
    </filter>
    <style>
      .bg{fill:#0d0d0d}.panel{fill:#151515;stroke:rgba(255,255,255,.12);stroke-width:1}.soft{fill:url(#g)}
      .title{font:700 38px Inter,Arial,sans-serif;fill:#fff;letter-spacing:-1.2px}.sub{font:400 17px Inter,Arial,sans-serif;fill:#a7a7a7}.mono{font:600 13px 'Geist Mono','SFMono-Regular',monospace;fill:#18E299;letter-spacing:.9px}.label{font:650 19px Inter,Arial,sans-serif;fill:#fff}.small{font:400 14px Inter,Arial,sans-serif;fill:#b8b8b8}.num{font:700 30px Inter,Arial,sans-serif;fill:#18E299}.arrow{stroke:#18E299;stroke-width:3;fill:none;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#18E299"/></marker>
  </defs>
  <rect class="bg" width="1200" height="760" rx="30"/>
  <circle cx="190" cy="40" r="270" class="soft"/>
  <circle cx="1010" cy="660" r="280" class="soft" opacity=".7"/>
  <text x="60" y="72" class="mono">ARXIV:2604.28181V1 · FULL-PAPER WALKTHROUGH</text>
  <text x="60" y="124" class="title">Synthetic Computers at Scale</text>
  <text x="60" y="154" class="sub">Persona-grounded user computers become long-horizon productivity simulations, then reusable agent experience.</text>

  <g filter="url(#shadow)">
    <rect x="60" y="220" width="220" height="132" rx="22" class="panel"/>
    <text x="84" y="260" class="mono">STEP 01</text><text x="84" y="292" class="label">Personas</text>
    <text x="84" y="322" class="small">occupation · projects · habits</text>
    <text x="84" y="342" class="small">organization style · tools</text>

    <rect x="330" y="220" width="240" height="132" rx="22" class="panel"/>
    <text x="354" y="260" class="mono">STEP 02</text><text x="354" y="292" class="label">Synthetic computer</text>
    <text x="354" y="322" class="small">filesystem policy + plan</text>
    <text x="354" y="342" class="small">dependency-aware artifacts</text>

    <rect x="620" y="220" width="240" height="132" rx="22" class="panel"/>
    <text x="644" y="260" class="mono">STEP 03</text><text x="644" y="292" class="label">Simulation</text>
    <text x="644" y="322" class="small">setup agent + work agent</text>
    <text x="644" y="342" class="small">weekly planning · daily work</text>

    <rect x="910" y="220" width="230" height="132" rx="22" class="panel"/>
    <text x="934" y="260" class="mono">STEP 04</text><text x="934" y="292" class="label">Experience</text>
    <text x="934" y="322" class="small">retrospective reports</text>
    <text x="934" y="342" class="small">occupation-specific skills</text>
  </g>
  <path d="M280 286 C300 286 306 286 330 286" class="arrow"/><path d="M570 286 C590 286 596 286 620 286" class="arrow"/><path d="M860 286 C884 286 890 286 910 286" class="arrow"/>

  <g>
    <rect x="60" y="430" width="250" height="170" rx="22" class="panel"/>
    <text x="86" y="470" class="mono">PRELIMINARY SCALE</text><text x="86" y="515" class="num">1,000</text><text x="86" y="544" class="small">synthetic computers</text><text x="86" y="568" class="small">112 → 197 avg. files after work</text>
    <rect x="340" y="430" width="250" height="170" rx="22" class="panel"/>
    <text x="366" y="470" class="mono">LONG-HORIZON RUNS</text><text x="366" y="515" class="num">2,272</text><text x="366" y="544" class="small">avg. turns per simulation</text><text x="366" y="568" class="small">8.59 hours avg. wall-clock</text>
    <rect x="620" y="430" width="250" height="170" rx="22" class="panel"/>
    <text x="646" y="470" class="mono">COLLABORATION</text><text x="646" y="515" class="num">5.5</text><text x="646" y="544" class="small">simulated collaborators avg.</text><text x="646" y="568" class="small">31 communications avg.</text>
    <rect x="900" y="430" width="240" height="170" rx="22" class="panel"/>
    <text x="926" y="470" class="mono">SKILL SIGNAL</text><text x="926" y="515" class="num">+7.0pp</text><text x="926" y="544" class="small">61.6% → 68.6%</text><text x="926" y="568" class="small">83 / 100 held-out wins</text>
  </g>

  <path d="M180 635 C420 710 780 710 1030 635" stroke="#18E299" stroke-opacity=".55" stroke-width="3" fill="none" stroke-dasharray="8 10"/>
  <text x="348" y="688" class="small">trajectory signals → skills → improved agents → next simulation round</text>
</svg>
